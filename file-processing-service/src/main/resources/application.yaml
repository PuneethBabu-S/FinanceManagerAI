spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/file_processing_db
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/finance-manager

  application:
    name: FileProcessingService

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8083

logging:
  level:
    org.springframework: DEBUG
    com.financemanagerai: DEBUG

# External Services
expense-service:
  url: http://localhost:8082

genai-service:
  url: http://localhost:8084

